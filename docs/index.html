<body>
    
    
    <div style="position: fixed;
                bottom: 50px; right: 50px; width: 180px; height: 180px;
                background-color: rgba(255, 255, 255, 0.95); border: 2px solid #333;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3); z-index: 9999;
                font-size: 14px; padding: 10px; border-radius: 5px;">
        <p style="margin: 0 0 8px 0; font-weight: bold;">Road Quality</p>
        <p style="margin: 4px 0;"><span style="color: #D81B60; font-size: 20px;">●</span> Premium (80-100)</p>
        <p style="margin: 4px 0;"><span style="color: #FF6F00; font-size: 20px;">●</span> Good (65-79)</p>
        <p style="margin: 4px 0;"><span style="color: #FDD835; font-size: 20px;">●</span> Acceptable (50-64)</p>
        <p style="margin: 4px 0;"><span style="color: #1976D2; font-size: 20px;">●</span> Poor (<50)</p>
        <hr style="margin: 8px 0; border: none; border-top: 1px solid #ccc;">
        <p style="margin: 4px 0; font-size: 11px; color: #666;">Generated: 2026-03-17 10:36</p>
        <p style="margin: 4px 0; font-size: 11px; color: #666;">Version: 0.5.1</p>
    </div>
    
    
    <script>
    // Load GeoJSON data
    fetch('gravel_roads.geojson')
        .then(response => response.json())
        .then(data => {
            // Color mapping by tier
            const tierColors = {
                'Premium': '#D81B60',
                'Good': '#FF6F00',
                'Acceptable': '#FDD835',
                'Poor': '#1976D2'
            };

            // Add GeoJSON layer
            L.geoJSON(data, {
                style: function(feature) {
                    const tier = feature.properties.premium_tier;
                    return {
                        color: tierColors[tier] || '#888888',
                        weight: 4,
                        opacity: 0.5
                    };
                },
                onEachFeature: function(feature, layer) {
                    const props = feature.properties;
                    const name = props.name || `Unnamed road (OSM ${props.osm_id})`;
                    const breakdown = props.score_breakdown;

                    // Tooltip (always visible on hover)
                    layer.bindTooltip(`${name} (${props.premium_tier}, ${props.premium_score} pts)`);

                    // Popup with road details
                    const popupContent = `
                        <div style="font-family: Arial, sans-serif; font-size: 13px; min-width: 300px;">
                            <h4 style="margin: 0 0 8px 0;">${name}</h4>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                                <div>
                                    <div style="font-weight: bold; margin-bottom: 4px;">Properties</div>
                                    <table style="width: 100%; font-size: 12px;">
                                        <tr><td><b>Score:</b></td><td><b>${props.premium_score} pts (${props.premium_tier})</b></td></tr>
                                        <tr><td><b>Length:</b></td><td><b>${props.length_km} km</b></td></tr>
                                        <tr><td>Surface:</td><td>${props.surface}</td></tr>
                                        <tr><td>Tracktype:</td><td>${props.tracktype || 'N/A'}</td></tr>
                                        <tr><td>Smoothness:</td><td>${props.smoothness || 'N/A'}</td></tr>
                                        <tr><td>Width:</td><td>${props.width || 'N/A'} m</td></tr>
                                    </table>
                                </div>
                                <div>
                                    <div style="font-weight: bold; margin-bottom: 4px;">Score Breakdown</div>
                                    <table style="width: 100%; font-size: 12px;">
                                        <tr><td>Surface:</td><td>${breakdown.surface}/25</td></tr>
                                        <tr><td>Tracktype:</td><td>${breakdown.tracktype}/25</td></tr>
                                        <tr><td>Smoothness:</td><td>${breakdown.smoothness}/20</td></tr>
                                        <tr><td>Traffic:</td><td>${breakdown.traffic}/15</td></tr>
                                        <tr><td>Width:</td><td>${breakdown.width}/10</td></tr>
                                        <tr><td>Access:</td><td>${breakdown.access}/5</td></tr>
                                    </table>
                                </div>
                            </div>
                            <p style="margin: 8px 0 0 0; font-size: 11px;">
                                <a href="https://www.openstreetmap.org/way/${props.osm_id}" target="_blank">
                                    View on OpenStreetMap
                                </a>
                            </p>
                        </div>
                    `;

                    layer.bindPopup(popupContent, {
                        maxWidth: 350
                    });
                }
            }).addTo(map_c914cdec2ae0d50dfc4b4c60c937cf74);
        })
        .catch(error => console.error('Error loading GeoJSON:', error));
    </script>
    
    
            <div class="folium-map" id="map_c914cdec2ae0d50dfc4b4c60c937cf74" ></div>
        
</body>
<script>
    
    
            var map_c914cdec2ae0d50dfc4b4c60c937cf74 = L.map(
                "map_c914cdec2ae0d50dfc4b4c60c937cf74",
                {
                    center: [51.1079, 17.0385],
                    crs: L.CRS.EPSG3857,
                    ...{
  "zoom": 11,
  "zoomControl": true,
  "preferCanvas": false,
}

                }
            );

            

        
    
            var tile_layer_983d8dfb60135e65c8ec72520cdef599 = L.tileLayer(
                "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
                {
  "minZoom": 0,
  "maxZoom": 19,
  "maxNativeZoom": 19,
  "noWrap": false,
  "attribution": "\u0026copy; \u003ca href=\"https://www.openstreetmap.org/copyright\"\u003eOpenStreetMap\u003c/a\u003e contributors",
  "subdomains": "abc",
  "detectRetina": false,
  "tms": false,
  "opacity": 1,
}

            );
        
    
            tile_layer_983d8dfb60135e65c8ec72520cdef599.addTo(map_c914cdec2ae0d50dfc4b4c60c937cf74);
        
</script>
